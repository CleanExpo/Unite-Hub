name: Smoke Tests

on:
  workflow_run:
    workflows: ['CI/CD Pipeline']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://unite-group.in'

permissions:
  contents: read

env:
  BASE_URL: ${{ github.event.inputs.base_url || 'https://unite-group.in' }}

jobs:
  smoke-tests:
    name: Smoke Tests (12 checks)
    runs-on: ubuntu-latest
    # Only run if the CI pipeline succeeded (or manually dispatched)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      # ── Check 1: Health endpoint ──────────────────────────────────────────
      - name: 'Check 1: App health endpoint'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/health" --max-time 10)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Health endpoint returned $STATUS"
            exit 1
          fi
          echo "PASS: Health endpoint OK"

      # ── Check 2: Homepage renders ─────────────────────────────────────────
      - name: 'Check 2: Homepage renders (200 + HTML)'
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/" --max-time 15)
          echo "Homepage status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "FAIL: Homepage returned $RESPONSE"
            exit 1
          fi
          echo "PASS: Homepage OK"

      # ── Check 3: Key resource pages ──────────────────────────────────────
      - name: 'Check 3: Resource pages load'
        run: |
          PAGES="/resources/ato-tax-guide /resources/ai-crm-australia /xero-integration"
          FAILED=0
          for PAGE in $PAGES; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$PAGE" --max-time 15)
            echo "$PAGE → $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $PAGE returned $STATUS"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] && echo "PASS: All resource pages OK" || exit 1

      # ── Check 4: API routes respond ───────────────────────────────────────
      - name: 'Check 4: Core API routes respond'
        run: |
          ENDPOINTS="/api/health"
          FAILED=0
          for EP in $ENDPOINTS; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$EP" --max-time 10)
            echo "$EP → $STATUS"
            if [ "$STATUS" = "000" ]; then
              echo "FAIL: $EP timed out or unreachable"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] && echo "PASS: API routes reachable" || exit 1

      # ── Check 5: Static assets load ───────────────────────────────────────
      - name: 'Check 5: Static assets load (no 404s)'
        run: |
          # Check favicon and manifest
          for ASSET in "/favicon.ico"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$ASSET" --max-time 10)
            echo "$ASSET → $STATUS"
            if [ "$STATUS" = "404" ]; then
              echo "FAIL: $ASSET returned 404"
              exit 1
            fi
          done
          echo "PASS: Static assets OK"

      # ── Check 6: Sitemap valid ────────────────────────────────────────────
      - name: 'Check 6: Sitemap returns valid XML'
        run: |
          STATUS=$(curl -s -o /tmp/sitemap.xml -w "%{http_code}" "$BASE_URL/sitemap.xml" --max-time 15)
          echo "Sitemap status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Sitemap returned $STATUS"
            exit 1
          fi
          if ! grep -q '<urlset' /tmp/sitemap.xml; then
            echo "FAIL: Sitemap missing <urlset> element"
            exit 1
          fi
          URL_COUNT=$(grep -c '<url>' /tmp/sitemap.xml || true)
          echo "PASS: Sitemap OK ($URL_COUNT URLs)"

      # ── Check 7: robots.txt valid ─────────────────────────────────────────
      - name: 'Check 7: robots.txt present'
        run: |
          STATUS=$(curl -s -o /tmp/robots.txt -w "%{http_code}" "$BASE_URL/robots.txt" --max-time 10)
          echo "robots.txt status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: robots.txt returned $STATUS"
            exit 1
          fi
          echo "PASS: robots.txt OK"

      # ── Check 8: Auth pages reachable ────────────────────────────────────
      - name: 'Check 8: Auth pages reachable'
        run: |
          for PAGE in "/login" "/signup" "/register"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$PAGE" --max-time 15)
            echo "$PAGE → $STATUS"
            # 200 (page) or 301/302 (redirect) are both acceptable
            if [ "$STATUS" = "000" ] || [ "$STATUS" = "500" ] || [ "$STATUS" = "503" ]; then
              echo "FAIL: $PAGE returned $STATUS"
              exit 1
            fi
          done
          echo "PASS: Auth pages reachable"

      # ── Check 9: Security headers present ────────────────────────────────
      - name: 'Check 9: Security headers present'
        run: |
          HEADERS=$(curl -sI "$BASE_URL/" --max-time 10)
          echo "$HEADERS"
          FAILED=0
          for HEADER in "x-content-type-options" "x-frame-options"; do
            if echo "$HEADERS" | grep -qi "$HEADER"; then
              echo "PASS: $HEADER present"
            else
              echo "WARN: $HEADER missing (non-blocking)"
            fi
          done

      # ── Check 10: No mixed content errors (Playwright) ───────────────────
      - name: 'Check 10-12: Playwright smoke tests'
        run: npx playwright test tests/smoke/ --reporter=line
        env:
          BASE_URL: ${{ env.BASE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ env.BASE_URL }}
        continue-on-error: true

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: playwright-report/
          retention-days: 7

name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly security scans on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Single Next.js app at the repo root — scans the root package.json.
    # The `secrets` context cannot be used in a job-level `if`, so the token is
    # exposed as a job env var and the Snyk-specific steps are gated on it. When
    # SNYK_TOKEN is unset the scan steps skip honestly (the job still reports).
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        if: env.SNYK_TOKEN != ''
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --file=package.json

      - name: Upload Snyk report
        if: env.SNYK_TOKEN != '' && always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Dependency Review requires GitHub dependency graph to be enabled for the
    # repository. Keep it opt-in so PRs are not hard-blocked when that repo
    # setting is unavailable.
    if: github.event_name == 'pull_request' && vars.DEPENDENCY_REVIEW_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, LGPL-3.0

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production deps, fail on critical)
        # Real gate: fails the job on any critical advisory. --prod excludes
        # dev-only tooling advisories that do not ship to production. No
        # `|| true` — a green tick here means "no critical prod advisories".
        run: pnpm audit --audit-level=critical --prod

      - name: Generate audit report
        # Report generation must never fail the job — the gate above owns
        # pass/fail. `|| true` is intentional and scoped to artifact output only.
        if: always()
        run: pnpm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [npm-audit, trivy-scan]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Display security scan results
        # Reports the real job outcomes so the summary cannot show a false PASS.
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Required Scans:" >> $GITHUB_STEP_SUMMARY
          echo "- NPM Audit: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy Filesystem Scan: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the uploaded artifact reports for detailed findings." >> $GITHUB_STEP_SUMMARY

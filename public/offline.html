<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unite Group - Offline</title>
  <meta name="description" content="You are currently offline. Unite Group will be available once you reconnect.">
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #3b82f6, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.125rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .features {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .feature {
      background-color: #1e293b;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #334155;
      text-align: left;
      transition: transform 0.2s;
    }

    .feature:hover {
      transform: translateY(-2px);
      border-color: #475569;
    }

    .feature h3 {
      color: #f1f5f9;
      font-size: 1.125rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feature p {
      font-size: 0.875rem;
      margin: 0;
      color: #94a3b8;
    }

    .retry-button {
      background: linear-gradient(135deg, #3b82f6 0%, #14b8a6 100%);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      background-color: #dc26261a;
      color: #fbbf24;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #fbbf24;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (min-width: 640px) {
      .features {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.684 3.051a1 1 0 0 1 .632.268l7.933 7.933a1 1 0 0 1 0 1.414l-4.584 4.584a1 1 0 0 1-1.414 0L3.318 9.317a1 1 0 0 1-.268-.632L3 8.5v-.997c0-1.105.895-2 2-2h.997l.185-.05Z" fill="#3b82f6" opacity="0.3"/>
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 12h8M12 8v8" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>Don't worry! Unite Group works offline too. Some features may be limited, but we've got you covered.</p>
    
    <div class="features">
      <div class="feature">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Cached Content
        </h3>
        <p>Access previously viewed pages and resources</p>
      </div>
      
      <div class="feature">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Auto Sync
        </h3>
        <p>Your data will sync when connection returns</p>
      </div>
    </div>
    
    <button class="retry-button" onclick="window.location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Try Again
    </button>
    
    <div class="status">
      <span class="pulse"></span>
      Waiting for connection...
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });

    // Check connection status every few seconds
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
